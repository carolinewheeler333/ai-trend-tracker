name: Daily AI Digest

on:
  schedule:
    - cron: "0 7 * * *"   # 7am UTC every day
  workflow_dispatch:        # manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install feedparser groq

      - name: Fetch and summarise
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python fetch_digest.py

      - name: Commit digest
        run: |
          git config user.name  "AI Digest Bot"
          git config user.email "bot@users.noreply.github.com"
          git add digest/
          git diff --cached --quiet || git commit -m "chore: daily AI digest $(date -u +%Y-%m-%d)"
          git push
